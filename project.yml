name: Sayboard
options:
  bundleIdPrefix: app.sayboard
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_EMIT_LOC_STRINGS: "YES"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "62XTT6F73G"
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: true
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  DSWaveformImage:
    url: https://github.com/dmrschmidt/DSWaveformImage.git
    from: "14.0.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.7.9"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"
  Moonshine:
    url: https://github.com/moonshine-ai/moonshine-swift.git
    from: "0.0.49"
localPackages:
  - Packages/LlamaCpp

targets:
  Sayboard:
    type: application
    platform: iOS
    sources:
      - path: Sayboard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sayboard
        INFOPLIST_FILE: Sayboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sayboard/Sayboard.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Sayboard/Sayboard-Bridging-Header.h
    dependencies:
      - target: SayboardKeyboard
      - package: WhisperKit
      - package: DSWaveformImage
        product: DSWaveformImageViews
      - package: FluidAudio
      - package: ZIPFoundation
      - package: Moonshine
      - package: LlamaCpp
        product: llama
    postCompileScripts:
      - script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --strict --quiet
          else
            echo "warning: SwiftLint not installed. Run: brew install swiftlint"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
      - script: |
          "${SRCROOT}/scripts/lint-strings.sh"
        name: Lint String Catalogs
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - SayboardTests

  SayboardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SayboardTests
      - path: Shared
    dependencies:
      - target: Sayboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sayboard.tests
        GENERATE_INFOPLIST_FILE: "YES"

  SayboardKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: SayboardKeyboard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sayboard.keyboard
        INFOPLIST_FILE: SayboardKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: SayboardKeyboard/SayboardKeyboard.entitlements
        SKIP_INSTALL: true
    dependencies: []
    postCompileScripts:
      - script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --strict --quiet
          else
            echo "warning: SwiftLint not installed. Run: brew install swiftlint"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
    scheme:
      testTargets: []
